{% extends "base.html" %}
{% block title %}Registro de Juez{% endblock %}
{% block content %}
<div style="max-width: 480px; margin: 3rem auto;">
    <h2 style="margin-bottom: 1.5rem;">Registro de Juez</h2>

    {% if errors %}
    <div style="background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;">
        <ul style="margin: 0; padding-left: 1.25rem;">
            {% for error in errors.values %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <form method="post" style="display: flex; flex-direction: column; gap: 1rem;">
        {% csrf_token %}
        <div>
            <label for="username" style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Usuario</label>
            <input type="text" id="username" name="username" value="{{ data.username|default:'' }}" required
                style="width: 100%; padding: 0.625rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem;">
        </div>
        <div>
            <label for="first_name" style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Nombre</label>
            <input type="text" id="first_name" name="first_name" value="{{ data.first_name|default:'' }}"
                style="width: 100%; padding: 0.625rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem;">
        </div>
        <div>
            <label for="last_name" style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Apellido</label>
            <input type="text" id="last_name" name="last_name" value="{{ data.last_name|default:'' }}"
                style="width: 100%; padding: 0.625rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem;">
        </div>
        <div>
            <label for="email" style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Email</label>
            <input type="email" id="email" name="email" value="{{ data.email|default:'' }}"
                style="width: 100%; padding: 0.625rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem;">
        </div>
        <div>
            <label for="password" style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Contrasena</label>
            <input type="password" id="password" name="password" required minlength="8"
                style="width: 100%; padding: 0.625rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem;">
        </div>
        <button type="submit" style="padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer;">
            Registrarse
        </button>
    </form>

    <p style="text-align: center; margin-top: 1rem;">
        Ya tienes cuenta? <a href="{% url 'ui:juez_login' %}" style="color: var(--primary);">Inicia sesion</a>
    </p>
</div>
{% endblock %}
